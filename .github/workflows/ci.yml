name: CI

on:
  push:
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # нужно для GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # (опционально) Логин в GHCR, чтобы можно было пушить образ
      - name: Log in to GHCR
        if: github.ref_name == 'main' || github.ref_name == 'master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Сборка образа (с кэшем)
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: steelcalculator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Поднимаем Postgres
      - name: Start Postgres
        run: |
          docker run -d --name db \
            -e POSTGRES_DB=db \
            -e POSTGRES_USER=diana \
            -e POSTGRES_PASSWORD=20041902 \
            -p 5540:5432 \
            postgres:16

      # Запускаем приложение (оно подключается к БД через host.docker.internal)
      - name: Run app container
        run: |
          docker run -d --name web \
            -e DATABASE_URL="postgresql+psycopg2://diana:20041902@host.docker.internal:5540/db" \
            -p 5000:5000 \
            steelcalculator:ci

      # Smoke test: проверяем, что сервер отвечает
      - name: Smoke test
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:5000/ > /dev/null; then
              echo "OK: app is up"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done
          echo "App did not start"
          docker logs web
          exit 1

      # Публикация образа в GHCR (только main/master)
      - name: Push image to GHCR
        if: github.ref_name == 'main' || github.ref_name == 'master'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha

      - name: Cleanup
        if: always()
        run: |
          docker rm -f web db || true

name: CI (SteelCalculator only)

on:
  push:
    paths:
      - "App/SteelCalculator/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "App/SteelCalculator/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: App/SteelCalculator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t steelcalculator:ci .

      - name: Run container
        run: |
          docker run -d --name steelcalculator_test \
            -p 5000:5000 \
            steelcalculator:ci

      - name: Smoke test
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:5000/ > /dev/null; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done
          docker logs steelcalculator_test
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f steelcalculator_test || true

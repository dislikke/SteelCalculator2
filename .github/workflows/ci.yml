name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          ls -la

      - name: Build Docker image
        run: docker build -t steelcalculator:ci .

      - name: Run container
        run: |
          docker run -d --name steelcalculator_test \
            -p 5000:5000 \
            steelcalculator:ci

      - name: Smoke test
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:5000/ > /dev/null; then
              echo "OK: app is up"
              exit 0
            fi
            sleep 2
          done
          docker logs steelcalculator_test
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f steelcalculator_test || true

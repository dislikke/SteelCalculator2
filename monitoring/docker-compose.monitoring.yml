services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring
    restart: unless-stopped

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://diana:20041902@steelcalculator-db-1:5432/db?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - monitoring
      - steelcalculator_default
    restart: unless-stopped

volumes:
  grafana-data:

networks:
  monitoring:
  steelcalculator_default:
    external: true
    name: steelcalculator_default


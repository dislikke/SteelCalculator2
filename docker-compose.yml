services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: diana
      POSTGRES_PASSWORD: 20041902
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://diana:20041902@db:5432/db
    ports:
      - "8080:5000"
    depends_on:
      - db

volumes:
  postgres-data:

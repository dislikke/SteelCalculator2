services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: steel_user
      POSTGRES_PASSWORD: steel_calc_2026
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://steel_user:steel_calc_2026@db:5432/db
    ports:
      - "5002:5000"
    depends_on:
      - db

volumes:
  postgres-data:

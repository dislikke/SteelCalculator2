{% extends 'main/base.html' %}

{% block content %}
<div class="auth-wrapper">
  <div class="card shadow-lg border-0 rounded-4 auth-card">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <h2 class="fw-bold mb-2 auth-title">Вход в систему</h2>
        <p class="text-muted mb-0">Введите email и пароль для входа</p>
      </div>

      <form method="post" class="auth-form">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control form-control-lg"
            id="email"
            name="email"
            placeholder="Введите email"
            required
          >
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">Пароль</label>
          <input
            type="password"
            class="form-control form-control-lg"
            id="password"
            name="password"
            placeholder="Введите пароль"
            required
          >
        </div>

        <button type="submit" class="btn btn-dark btn-lg rounded-3 auth-submit">
          Войти
        </button>

        <div class="text-center mt-4">
          <span class="text-muted">Нет аккаунта?</span>
          <a href="{{ url_for('user.register') }}" class="text-decoration-none fw-semibold">
            Зарегистрироваться
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
